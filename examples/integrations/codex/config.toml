# OpenAI Codex CLI — use Cura as the model provider.
# Copy into ~/.codex/config.toml, then: export ACTAVA_API_KEY=... && codex
#
# The Cura gateway speaks Chat Completions, hence wire_api = "chat". If your Codex
# version has dropped chat-completions support, route through a local chat->responses
# proxy instead.

model = "actava/cura-soar"
model_provider = "cura"

[model_providers.cura]
name = "Cura 1T"
base_url = "https://inference.actava.ai/v1"
env_key = "ACTAVA_API_KEY"
wire_api = "chat"
